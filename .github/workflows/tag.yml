name: Create Release

on:
  push:
    tags:
      - '*'
jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Verify SDK version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/}"
          SDK_VERSION=$(sed -n 's/^public let SDK_VERSION = "\(.*\)"/\1/p' Sources/KovaleeSDK/Kovalee.swift)
          if [ "$TAG_VERSION" != "$SDK_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match SDK_VERSION ($SDK_VERSION) in Sources/KovaleeSDK/Kovalee.swift"
            exit 1
          fi
          echo "Version check passed: $TAG_VERSION"

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # This token is provided by Actions, you do not need to create your own token
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          generateReleaseNotes: true 
          makeLatest: true
